<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <title>Game's Stats Comparator</title>
</head>

<body style="font-family: Arial; max-width: 800px; margin: 40px auto;">
    <h1>Game's Stats Comparator</h1>

    {% if error %}
    <div style="background: #fee; color: red; padding: 15px; border-radius: 5px; margin-bottom: 20px;">
        <strong>Error:</strong> {{ error }}
    </div>
    {% endif %}

    <p>Type two games' names and compare their Twitch stats and get IGDB's information about them.</p>

    <form action="/compare" method="post">
        <div style="margin-bottom: 15px;">
            <label>First game:</label><br>
            <input type="text" name="game1" required placeholder="i.e. Valorant" style="padding: 8px; width: 300px;">
        </div>
        <div style="margin-bottom: 15px;">
            <label>Second game:</label><br>
            <input type="text" name="game2" required placeholder="i.e. League of Legends"
                style="padding: 8px; width: 300px;">
        </div>
        <button type="submit"
            style="padding: 10px 20px; background: #6441a5; color: white; border: none; border-radius: 4px; cursor: pointer;">
            Compare
        </button>
    </form>
</body>

</html>
