syntax = "proto3";
package library;

message Book {
  string id = 1;
  string title = 2;
  string author = 3;
  repeated string tags = 4;
  double price = 5;
}

message BookRequest {
  string id = 1;
}

message SearchRequest {
  string query = 1;
  int32 max_results = 2;
}

message BooksResponse {
  repeated Book books = 1;
  int32 total_count = 2;
}

message Empty {}

service LibraryService {
  rpc GetBook(BookRequest) returns (Book);
  rpc ListBooks(Empty) returns (stream Book);
  rpc SearchBooks(SearchRequest) returns (BooksResponse);
}
