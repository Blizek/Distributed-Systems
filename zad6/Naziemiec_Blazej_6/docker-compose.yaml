services:
  ray-head:
    image: rayproject/ray:2.55.1-py310
    container_name: ray-head
    ports:
      - "6379:6379"     # Ray Redis port
      - "8265:8265"     # Ray Dashboard port
      - "10001:10001"   # Ray Client port
    shm_size: "2gb"
    volumes:
      - ./notebook:/home/ray/work
    working_dir: /home/ray/work
    command: ray start --head --port=6379 --dashboard-host=0.0.0.0 --ray-client-server-port=10001 --block
    restart: unless-stopped

  ray-worker:
    image: rayproject/ray:2.55.1-py310
    container_name: ray-worker
    depends_on:
      - ray-head
    shm_size: "2gb"
    volumes:
      - ./notebook:/home/ray/work
    working_dir: /home/ray/work
    command: ray start --address=ray-head:6379 --block
    restart: unless-stopped

  jupyter:
    image: rayproject/ray:2.55.1-py310
    container_name: ray-jupyter-lab-container

    shm_size: "2gb"

    ports:
      - "8888:8888"

    volumes:
      - ./notebook:/home/ray/work

    working_dir: /home/ray/work

    command: >
      bash -lc "
      pip install --no-cache-dir
      jupyterlab
      notebook
      ipykernel
      ipywidgets
      pandas
      numpy
      scipy
      matplotlib
      scikit-learn
      requests
      &&
      jupyter lab
      --ip=0.0.0.0
      --port=8888
      --no-browser
      --ServerApp.token=raylab
      --ServerApp.allow_origin='*'
      --ServerApp.notebook_dir=/home/ray/work
      "

    restart: unless-stopped

